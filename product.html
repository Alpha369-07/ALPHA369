<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ALPHA 369 | Product</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
        }

        header {
            background: black;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid gold;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: gold;
        }

        nav a {
            text-decoration: none;
            color: white;
            margin-left: 20px;
        }

        nav a:hover {
            color: gold;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 50px;
            gap: 40px;
            align-items: center;
            justify-content: center;
        }

        .product-img {
            flex: 1;
            max-width: 400px;
        }

        .product-img img {
            width: 100%;
            border-radius: 15px;
        }

        .product-info {
            flex: 1;
            max-width: 450px;
        }

        .product-info h1 {
            color: gold;
            margin-bottom: 15px;
        }

        .price {
            font-size: 24px;
            color: gold;
            margin: 15px 0;
        }

        .desc {
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: gold;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: black;
            margin-top: 40px;
            border-top: 2px solid gold;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo"> ALPHA 369</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="container">

        <div class="product-img">
            <img src="https://via.placeholder.com/400" alt="">
        </div>

        <div class="product-info">
            <h1>Wireless Earbuds</h1>
            <div class="price">₹999</div>

            <p class="desc">
                High quality wireless earbuds with deep bass,
                long battery life and comfortable fit.
                Perfect for gym, gaming and daily use.
            </p>

            <a href="#" class="btn">Buy Now</a>
        </div>

    </section>

    <footer>
        © 2026 ALPHA369 Store | All Rights Reserved
    </footer>

</body>

</html>
