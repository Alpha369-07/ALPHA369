<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ALPHA 369 | Shop</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
        }

        header {
            background: black;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid gold;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: gold;
        }

        nav a {
            text-decoration: none;
            color: white;
            margin-left: 20px;
        }

        nav a:hover {
            color: gold;
        }

        .shop-title {
            text-align: center;
            padding: 40px;
            font-size: 35px;
            color: gold;
        }

        .products {
            padding: 30px 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px gold;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 {
            margin-top: 10px;
        }

        .price {
            color: gold;
            margin: 8px 0;
        }

        .btn {
            display: inline-block;
            padding: 8px 15px;
            background: gold;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: black;
            margin-top: 30px;
            border-top: 2px solid gold;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo"> ALPHA 369</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <h2 class="shop-title">All Products</h2>

    <section class="products">

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Bluetooth Speaker</h3>
            <div class="price">₹1299</div>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Sports Shoes</h3>
            <div class="price">₹1999</div>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Protein Powder</h3>
            <div class="price">₹2499</div>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Smart Watch</h3>
            <div class="price">₹2999</div>
            <a href="#" class="btn">Buy Now</a>
        </div>

    </section>

    <footer>
        © 2026 ALPHA 369 Store | All Rights Reserved
    </footer>

</body>

</html>
