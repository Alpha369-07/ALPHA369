<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ALFA 369</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
        }

        /* ===== HEADER (SAME AS HOME) ===== */
        header {
            background: #000;
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid gold;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: gold;
            letter-spacing: 2px;
        }

        nav a {
            text-decoration: none;
            color: white;
            margin-left: 25px;
            transition: 0.3s;
        }

        nav a:hover {
            color: gold;
        }

        /* ===== CONTACT SECTION ===== */
        .main {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact-container {
            background: #1a1a1a;
            padding: 40px;
            width: 380px;
            border-radius: 18px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            text-align: center;
            border: 1px solid gold;
        }

        .contact-container h2 {
            color: gold;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .contact-container p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-box {
            margin-bottom: 15px;
        }

        .input-box input,
        .input-box textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid gold;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            background: #000;
            color: #fff;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: gold;
            color: #000;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ffd700;
        }

        .email {
            margin-top: 20px;
            font-weight: bold;
            color: gold;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 25px;
            background: black;
            border-top: 2px solid gold;
        }
    </style>

</head>

<body>

    <header>
        <div class="logo">ALFA 369</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="main">

        <div class="contact-container">
            <h2>ALFA 369 👑</h2>
            <p>Contact us for business, support & collaboration</p>

            <form action="mailto:alpha369.india@gmail.com" method="post" enctype="text/plain">

                <div class="input-box">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>

                <div class="input-box">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>

                <div class="input-box">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>

                <button type="submit">Send Message</button>

            </form>

            <div class="email">
                📩 alpha369.india@gmail.com
            </div>
        </div>

    </div>


    <footer>
        © 2026 ALFA 369 Official Store | All Rights Reserved
    </footer>

</body>
<a href="mailto:alpha369.india@gmail.com">contact us</a>

</html>
