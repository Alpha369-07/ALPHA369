<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA 369 Store</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
        }

        header {
            background: black;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid gold;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: gold;
        }

        nav a {
            text-decoration: none;
            color: white;
            margin-left: 20px;
            font-size: 16px;
        }

        nav a:hover {
            color: gold;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(45deg, #000, #222);
        }

        .hero h1 {
            font-size: 40px;
            color: gold;
        }

        .hero p {
            margin-top: 10px;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: gold;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }

        .products {
            padding: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px gold;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 {
            margin-top: 15px;
        }

        .price {
            color: gold;
            margin: 10px 0;
            font-size: 18px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: black;
            border-top: 2px solid gold;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ALPHA 369</div>
        <nav>
            <a href="#">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to ALPHA 369 Store</h1>
        <p>Shop Electronics, Fashion & Fitness Products</p>
        <a href="#" class="btn">Shop Now</a>
    </section>

    <section class="products">

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Wireless Earbuds</h3>
            <div class="price">₹999</div>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Gym T-Shirt</h3>
            <div class="price">₹499</div>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Dumbbell Set</h3>
            <div class="price">₹1499</div>
            <a href="#" class="btn">Buy Now</a>
        </div>
        <a href="cart.html">

        </a>

    </section>

    <footer>
        © 2026 ALPHA 369 Store | All Rights Reserved
    </footer>

</body>

</html>
